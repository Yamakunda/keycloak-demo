version: "3.8"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak-config:/opt/keycloak/data/import
    networks:
      - keycloak-net
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s


  razor-app:
    build: ./razor-demo
    container_name: razor-app
    ports:
      - "5100:5100"
    # Toàn bộ config Keycloak (ServerUrl/Realm/ClientId/ClientSecret) đọc từ .env,
    # không hardcode ở đây. Browser redirect và backchannel đều dùng localhost:8080;
    # extra_hosts map "localhost" → host-gateway để issuer khớp.
    env_file:
      - ./razor-demo/.env
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-net

  bookstore-api:
    build: ./bookstore-api
    container_name: bookstore-api
    ports:
      - "3003:3003"
    # Config (PORT/REALM/CLIENT_SECRET…) đọc từ .env qua env_file, không hardcode.
    # Introspection gọi localhost:8080 → cần extra_hosts giống razor-app.
    env_file:
      - ./bookstore-api/.env
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-net

  demo-keycloak:
    build: ./demo-keycloak
    container_name: demo-keycloak
    # SPA static: biến REACT_APP_* đã nhúng vào bundle lúc build image;
    # mọi request (Keycloak, bookstore-api) đều do browser gọi, không cần env runtime.
    ports:
      - "3002:3002"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-net

  bookstore-api-2:
    build: ./bookstore-api-2
    container_name: bookstore-api-2
    ports:
      - "3013:3013"
    # Exchange code lấy token diễn ra ở đây (backend), không phải bookstore-fe-2 —
    # client_secret + redirect_uri (Keycloak client test-client-2) chỉ nằm ở .env này.
    env_file:
      - ./bookstore-api-2/.env
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-net

  bookstore-fe-2:
    build: ./bookstore-fe-2
    container_name: bookstore-fe-2
    # SPA static: biến REACT_APP_* đã nhúng vào bundle lúc build image (xem .dockerignore);
    # mọi request (Keycloak /login, bookstore-api-2) đều do browser gọi, không cần env runtime.
    ports:
      - "3012:3012"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-net

  bookstore-api-oauth:
    build: ./bookstore-api-oauth
    container_name: bookstore-api-oauth
    ports:
      - "3023:3023"
    # Bản OAuth demo: giống bookstore-api-2 nhưng dùng client test-client-oauth
    # và bộ port riêng (API 3023, FE 3022) để chạy song song với stack -2.
    env_file:
      - ./bookstore-api-oauth/.env
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-net

  bookstore-fe-oauth:
    build: ./bookstore-fe-oauth
    container_name: bookstore-fe-oauth
    # SPA static: biến REACT_APP_* nhúng vào bundle lúc build image;
    # browser gọi thẳng Keycloak :8080 và bookstore-api-oauth :3023.
    ports:
      - "3022:3022"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-net

networks:
  keycloak-net:
    driver: bridge
